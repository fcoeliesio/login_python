<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          Arial,
          sans-serif;
      }

      body {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: radial-gradient(circle at top, #1e293b, #020617);
        color: #e2e8f0;
        padding: 20px;
      }

      .container {
        width: 100%;
        max-width: 420px;
        padding: 42px 36px;
        border-radius: 18px;
        background: rgba(30, 41, 59, 0.75);
        backdrop-filter: blur(14px);
        border: 1px solid rgba(148, 163, 184, 0.2);
        box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6);
        position: relative;
        overflow: hidden;
      }

      /* fundo decorativo sem bloquear interação */
      .container::before {
        content: "";
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: radial-gradient(
          circle,
          rgba(59, 130, 246, 0.15),
          transparent 60%
        );
        transform: rotate(25deg);
        pointer-events: none;
        z-index: 0;
      }

      /* conteúdo acima do efeito */
      .container > * {
        position: relative;
        z-index: 1;
      }

      h1 {
        text-align: center;
        font-size: 28px;
        margin-bottom: 25px;
        font-weight: 700;
      }

      label {
        font-size: 13px;
        color: #94a3b8;
        display: block;
        margin-bottom: 6px;
      }

      input {
        width: 100%;
        padding: 12px 14px;
        margin-bottom: 16px;
        border-radius: 10px;
        border: 1px solid rgba(148, 163, 184, 0.25);
        background: rgba(15, 23, 42, 0.6);
        color: #e2e8f0;
        outline: none;
        transition: 0.2s;
      }

      input:focus {
        border-color: #3b82f6;
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.25);
      }

      button {
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        border: none;
        cursor: pointer;
        font-weight: 600;
        color: white;
        background: linear-gradient(135deg, #3b82f6, #2563eb);
        transition: 0.25s;
        margin-top: 8px;
      }

      button:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(37, 99, 235, 0.35);
      }

      .links {
        margin-top: 22px;
        text-align: center;
        font-size: 13px;
        color: #94a3b8;
      }

      .links a {
        color: #60a5fa;
        text-decoration: none;
        font-weight: 500;
      }

      .links a:hover {
        text-decoration: underline;
      }

      /* mensagens flask */
      .msg {
        padding: 12px;
        border-radius: 10px;
        margin-bottom: 18px;
        font-size: 13px;
        text-align: center;
        font-weight: 500;
      }

      .msg.error {
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid #ef4444;
        color: #fecaca;
      }

      .msg.success {
        background: rgba(34, 197, 94, 0.15);
        border: 1px solid #22c55e;
        color: #bbf7d0;
      }

      @media (max-width: 500px) {
        .container {
          padding: 28px;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>Login</h1>

      {% with messages = get_flashed_messages(with_categories=true) %} {% if
      messages %} {% for category, message in messages %}
      <div class="msg {{ category }}">{{ message }}</div>
      {% endfor %} {% endif %} {% endwith %}

      <form method="POST" action="{{ url_for('user.login_user') }}">
        <label for="username">Usuário</label>
        <input type="text" id="username" name="username" required />

        <label for="password">Senha</label>
        <input type="password" id="password" name="password" required />

        <button type="submit">Entrar no sistema</button>
      </form>

      <div class="links">
        <p>
          Não tem conta?
          <a href="{{ url_for('user.cadastro') }}">Criar conta</a>
        </p>

        <p>
          Esqueceu a senha?
          <a href="{{ url_for('user.redefine_password') }}">Recuperar acesso</a>
        </p>
      </div>
    </div>
  </body>
</html>
