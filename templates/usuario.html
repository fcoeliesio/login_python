<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Perfil do Usuário</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          Arial,
          sans-serif;
      }

      body {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: radial-gradient(circle at top, #1e293b, #020617);
        color: #e2e8f0;
        padding: 20px;
      }

      .container {
        width: 100%;
        max-width: 500px;
        padding: 42px 36px;
        border-radius: 18px;
        background: rgba(30, 41, 59, 0.75);
        backdrop-filter: blur(14px);
        border: 1px solid rgba(148, 163, 184, 0.2);
        box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6);
        text-align: center;
        position: relative;
        overflow: hidden;
      }

      /* brilho decorativo */
      .container::before {
        content: "";
        position: absolute;
        top: -60%;
        left: -60%;
        width: 220%;
        height: 220%;
        background: radial-gradient(
          circle,
          rgba(59, 130, 246, 0.12),
          transparent 60%
        );
        transform: rotate(25deg);
        pointer-events: none;
      }

      .container > * {
        position: relative;
      }

      h1 {
        font-size: 28px;
        margin-bottom: 22px;
        font-weight: 700;
      }

      .info {
        margin: 10px 0;
        font-size: 14px;
        color: #cbd5e1;
        line-height: 1.6;
      }

      .highlight {
        color: #60a5fa;
        font-weight: 600;
      }

      form {
        margin-top: 26px;
      }

      button {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        font-weight: 600;
        color: white;
        background: linear-gradient(135deg, #ef4444, #dc2626);
        transition: 0.25s ease;
      }

      button:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(239, 68, 68, 0.3);
      }

      /* badge visual opcional */
      .badge {
        display: inline-block;
        margin-bottom: 14px;
        font-size: 11px;
        letter-spacing: 1.2px;
        text-transform: uppercase;
        color: #93c5fd;
      }

      @media (max-width: 500px) {
        .container {
          padding: 28px;
        }

        h1 {
          font-size: 22px;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="badge">Área do Usuário</div>

      <h1>Perfil do Usuário</h1>

      <p class="info">
        Bem-vindo,
        <span class="highlight">{{ user.nome }}</span>
      </p>

      <p class="info">
        Usuário:
        <span class="highlight">{{ user.username }}</span>
      </p>

      <p class="info">
        Email:
        <span class="highlight">{{ user.email }}</span>
      </p>

      <form method="POST" action="{{ url_for('user.logout_user') }}">
        <button type="submit">Sair da conta</button>
      </form>
    </div>
  </body>
</html>
