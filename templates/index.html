<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Página Inicial</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      body {
        background: #0f172a;
        color: #e2e8f0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        padding: 20px;
      }

      .container {
        text-align: center;
        background: #1e293b;
        padding: 40px;
        border-radius: 12px;
        width: 100%;
        max-width: 500px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
      }

      h1 {
        font-size: 26px;
        margin-bottom: 10px;
      }

      p {
        margin: 10px 0;
        color: #cbd5e1;
      }

      a {
        display: inline-block;
        margin-top: 20px;
        padding: 12px 20px;
        background: #3b82f6;
        color: white;
        text-decoration: none;
        border-radius: 8px;
        transition: 0.3s;
      }

      a:hover {
        background: #2563eb;
      }

      @media (max-width: 600px) {
        .container {
          padding: 25px;
        }

        h1 {
          font-size: 22px;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>Bem-vindo ao Sistema</h1>

      <p>Este é um sistema de autenticação desenvolvido com Flask + MVC.</p>

      <p>Acesse sua conta para continuar.</p>

      <a href="{{ url_for('user.login_user') }}"> Fazer Login </a>
    </div>
  </body>
</html>
