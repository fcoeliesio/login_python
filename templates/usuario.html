<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Perfil do Usuário</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      body {
        background: #0f172a;
        color: #e2e8f0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        padding: 20px;
      }

      .container {
        background: #1e293b;
        padding: 40px;
        border-radius: 12px;
        width: 100%;
        max-width: 500px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        text-align: center;
      }

      h1 {
        font-size: 26px;
        margin-bottom: 20px;
      }

      .info {
        margin: 10px 0;
        color: #cbd5e1;
        font-size: 16px;
      }

      .highlight {
        color: #60a5fa;
        font-weight: bold;
      }

      form {
        margin-top: 25px;
      }

      button {
        padding: 12px 20px;
        border: none;
        border-radius: 8px;
        background: #ef4444;
        color: white;
        cursor: pointer;
        font-weight: bold;
        transition: 0.3s;
      }

      button:hover {
        background: #dc2626;
      }

      @media (max-width: 500px) {
        .container {
          padding: 25px;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>Perfil do Usuário</h1>

      <p class="info">
        Bem-vindo,
        <span class="highlight">{{ user.nome }}</span>!
      </p>

      <p class="info">
        Usuário: <span class="highlight">{{ user.username }}</span>
      </p>

      <p class="info">Email: <span class="highlight">{{ user.email }}</span></p>

      <form method="POST" action="{{ url_for('user.logout_user') }}">
        <button type="submit">Sair da conta</button>
      </form>
    </div>
  </body>
</html>
