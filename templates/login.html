<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      body {
        background: #0f172a;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        color: #e2e8f0;
        padding: 20px;
      }

      .container {
        background: #1e293b;
        padding: 40px;
        border-radius: 12px;
        width: 100%;
        max-width: 420px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
      }

      h1 {
        text-align: center;
        margin-bottom: 25px;
        font-size: 26px;
      }

      label {
        font-size: 14px;
        color: #cbd5e1;
      }

      input {
        width: 100%;
        padding: 12px;
        margin: 8px 0 16px 0;
        border: none;
        border-radius: 8px;
        outline: none;
      }

      input:focus {
        outline: 2px solid #3b82f6;
      }

      button {
        width: 100%;
        padding: 12px;
        background: #3b82f6;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
        transition: 0.3s;
      }

      button:hover {
        background: #2563eb;
      }

      .links {
        margin-top: 20px;
        text-align: center;
        font-size: 14px;
      }

      .links a {
        color: #60a5fa;
        text-decoration: none;
      }

      .links a:hover {
        text-decoration: underline;
      }

      @media (max-width: 500px) {
        .container {
          padding: 25px;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>Login</h1>

      <form method="POST" action="{{ url_for('user.login_user') }}">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required />

        <label for="password">Senha</label>
        <input type="password" id="password" name="password" required />

        <button type="submit">Entrar</button>
      </form>

      <div class="links">
        <p>
          Não tem conta?
          <a href="{{ url_for('user.cadastro') }}"> Criar conta </a>
        </p>

        <p>
          Esqueceu a senha?
          <a href="{{ url_for('user.redefine_password') }}">
            Recuperar acesso
          </a>
        </p>
      </div>
    </div>
  </body>
</html>
